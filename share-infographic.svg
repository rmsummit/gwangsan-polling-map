        <g>
          <circle cx="22" cy="22" r="22" fill="#03c75a"/><text x="22" y="31" text-anchor="middle" font-size="24" font-weight="900" fill="#fff">1</text>
          <text x="62" y="16" font-size="25" font-weight="800" fill="#111827">선거구 선택</text>
