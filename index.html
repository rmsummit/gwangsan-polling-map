}

function getCircleStyle(highlight = false) {
  const extraWeight = highlight ? 2 : 0;
  if (currentMapType === 'satellite') {
    return {
      strokeColor: '#f97316',
      strokeOpacity: 0.95,
      strokeWeight: 3 + extraWeight,
      fillColor: '#fb923c',
      fillOpacity: highlight ? 0.25 : 0.18,
      zIndex: highlight ? 120 : 80
    };
  }
  return {
    strokeColor: '#00a86b',
    strokeOpacity: 0.85,
    strokeWeight: 2 + extraWeight,
    fillColor: '#00c73c',
    fillOpacity: highlight ? 0.2 : 0.13,
    zIndex: highlight ? 120 : 80
  };
}

function refreshCircleStyles() {

function setMapType(type) {
  currentMapType = type === 'satellite' ? 'satellite' : 'normal';
  const mapTypeIds = naver.maps.MapTypeId || {};
  const mapTypeId = currentMapType === 'satellite'
    ? (mapTypeIds.SATELLITE || mapTypeIds.HYBRID)
    : mapTypeIds.NORMAL;
  if (mapTypeId && typeof map.setMapTypeId === 'function') {
    map.setMapTypeId(mapTypeId);
  }
  refreshCircleStyles();
  updateMapTypeControls();
  toggleMapTypeMenu(false);
}

function getPollingMarkerSize() {

}

}

}

function getPlaceDisplayName(p) {
  return p.name.replace(/제(\d+)투$/, '제$1투표소');
}

function loadReviewCoordinateDraft() {
  if (!window.localStorage) return {};
  try {
    return JSON.parse(window.localStorage.getItem(reviewStorageKey) || '{}');
  } catch (error) {
    return {};
  }
}

function saveReviewCoordinateDraft() {
  if (!window.localStorage) return;
  window.localStorage.setItem(reviewStorageKey, JSON.stringify(reviewCoordinateDraft));
}

function getPlaceCoordinates(p) {
  const draft = reviewMode ? reviewCoordinateDraft[p.name] : null;
  const override = draft || coordinateOverrides[p.name];
  return override ? { lat: override.lat, lon: override.lon } : { lat: p.lat, lon: p.lon };
}

function getPlacePosition(p) {
  const coordinates = getPlaceCoordinates(p);
  return new naver.maps.LatLng(coordinates.lat, coordinates.lon);
}

function getLatLngNumbers(position) {
  return {
    lat: typeof position.lat === 'function' ? position.lat() : position.y,
    lon: typeof position.lng === 'function' ? position.lng() : position.x
  };
}

function isOriginalCoordinate(p, coordinates) {
  return Math.abs(Number(coordinates.lat) - p.lat) < 0.0000001 && Math.abs(Number(coordinates.lon) - p.lon) < 0.0000001;
}

function updateReviewStatus() {
  const status = document.getElementById('review-status');
  if (!status) return;
  const count = Object.keys(reviewCoordinateDraft).length;
  status.textContent = reviewMode
    ? `검수 모드: ${count}곳 수정됨. 마커를 드래그하고 수정 완료를 누르세요.`
    : '';
}

function updateReviewDraft(index, position) {
  if (!reviewMode) return;
  const place = places[index];
  const coordinates = getLatLngNumbers(position);
  const rounded = {
    lat: Number(coordinates.lat.toFixed(7)),
    lon: Number(coordinates.lon.toFixed(7))
  };
  if (isOriginalCoordinate(place, rounded)) {
    delete reviewCoordinateDraft[place.name];
  } else {
    reviewCoordinateDraft[place.name] = {
      ...rounded,
      source: 'manual review',
      updatedAt: new Date().toISOString()
    };
  }
  saveReviewCoordinateDraft();
  updateReviewStatus();
}

function resetReviewDraft() {
  if (!reviewMode || !window.confirm('검수 중 수정한 마커 위치를 모두 초기화할까요?')) return;
  reviewCoordinateDraft = {};
  saveReviewCoordinateDraft();
  places.forEach((place, index) => {
    const position = getPlacePosition(place);
    markers[index].setPosition(position);
    circles[index].setCenter(position);
  });
  updateReviewStatus();
}

function downloadReviewOverrides() {
  if (!reviewMode) return;
  const payload = Object.fromEntries(Object.entries(reviewCoordinateDraft).sort(([a], [b]) => a.localeCompare(b, 'ko')));
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const timestamp = new Date().toISOString().replace(/[-:]/g, '').replace(/\..+/, '');
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `marker-overrides-${timestamp}.json`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(link.href), 1000);
  window.alert(`${Object.keys(payload).length}곳의 수정 좌표 파일을 다운로드했습니다.`);
}

function getPlaceDong(p) {
  const match = p.name.match(/^(.*?)(?:제\d+투(?:표소)?|투표소)$/);
  return match ? match[1] : '';
}

function getSelectedDistrict() {
  return districts.find(district => district.id === selectedDistrict);
}

function getSelectedArea() {
  return districtAreas.find(area => area.id === selectedDistrict);
}

function getSelectedDongs() {
  const district = getSelectedDistrict();
  if (district) return district.dongs;
  const area = getSelectedArea();
  if (area) return districts.filter(district => district.area === area.area).flatMap(district => district.dongs);
  return districts.flatMap(district => district.dongs);
}

function getFilterLabel(visibleCount) {

  if (selectedDong) return `${selectedDong} ${visibleCount}곳`;

  if (area) return `${area.label} ${visibleCount}곳`;
  return activeQuery ? `${visibleCount}곳 검색됨` : `전체 ${visibleCount}곳`;
}

  if (previousSelectedIndex !== null && visibleIndices.includes(previousSelectedIndex)) {
    selectedIndex = previousSelectedIndex;
    setActiveItem(previousSelectedIndex);
    const previousPlace = places[previousSelectedIndex];
    setPrintTitle(previousPlace);
    document.getElementById('selected-title').textContent = `직전 확인: ${getPlaceDisplayName(previousPlace)} - ${previousPlace.address}`;
  } else {
    const message = visibleIndices.length ? `${getFilterLabel(visibleIndices.length)} - 투표소를 선택하세요` : '검색 결과 없음';
    clearSelection(message);
  }
  if (visibleIndices.length) fitPlaces(visibleIndices);
  closePopup();
  selectedFilterContext = null;
  collapseMobileToolbar();
}

function setLocateButtonState(label, disabled = false) {
  ['locate-btn', 'map-locate-btn'].forEach(id => {
    const button = document.getElementById(id);
    if (!button) return;
    button.textContent = label;
    button.disabled = disabled;
  });
}

function distanceMeters(lat1, lon1, lat2, lon2) {
  const toRad = value => value * Math.PI / 180;
  const earthRadius = 6371000;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return earthRadius * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function formatMeters(distance) {
  return distance >= 1000 ? `${(distance / 1000).toFixed(1)}km` : `${Math.round(distance)}m`;
}

function getNearestPlace(lat, lon) {
  return places.reduce((nearest, place, index) => {
    const coordinates = getPlaceCoordinates(place);
    const distance = distanceMeters(lat, lon, coordinates.lat, coordinates.lon);
    if (!nearest || distance < nearest.distance) return { place, index, distance };
    return nearest;
  }, null);
}

function updateLocationSafetyStatus(lat, lon) {
  const nearest = getNearestPlace(lat, lon);
  if (!nearest) return;
  const status = document.getElementById('location-status');
  const isInside = nearest.distance <= 100;
  const distanceText = formatMeters(nearest.distance);
  const text = isInside
    ? `경고: 가장 가까운 ${getPlaceDisplayName(nearest.place)} 반경 100m 안입니다. 현재 거리 약 ${distanceText}`
    : `안전: 가장 가까운 ${getPlaceDisplayName(nearest.place)}까지 약 ${distanceText}로 100m 밖입니다.`;
  status.className = isInside ? 'warning' : 'safe';
  status.textContent = text;
  document.getElementById('selected-title').textContent = text;
}

function showUserLocationOnMap(position) {
  const { latitude, longitude } = position.coords;
  const pos = new naver.maps.LatLng(latitude, longitude);
  if (!userMarker) {
    userMarker = new naver.maps.Marker({
      position: pos,
      map,
      title: '내 위치',
      zIndex: 200,
      icon: {
        content: '<div style="width:12px;height:12px;border:2px solid #fff;border-radius:50%;background:#ef233c;box-shadow:0 0 0 3px rgba(239,35,60,.24),0 2px 7px rgba(0,0,0,.26)"></div>',
        anchor: new naver.maps.Point(8, 8)
      }
    });
  } else {
    userMarker.setPosition(pos);
    userMarker.setMap(map);
  }
  map.setCenter(pos);
  map.setZoom(Math.max(map.getZoom(), 16));
  updateLocationSafetyStatus(latitude, longitude);
  setLocateButtonState('내 위치');
  collapseMobileToolbar();
}

function handleLocationError(error) {
  setLocateButtonState('내 위치');
  const messages = {
    1: '위치 권한이 거부되었습니다. 브라우저 주소창의 위치 권한을 허용한 뒤 다시 눌러 주세요.',
    2: '현재 위치를 확인할 수 없습니다. 잠시 후 다시 시도해 주세요.',
    3: '위치 확인 시간이 초과되었습니다. 다시 눌러 주세요.'
  };
  window.alert(messages[error.code] || '현재 위치를 확인할 수 없습니다.');
}

function showMyLocation() {
  if (!navigator.geolocation) {
    window.alert('이 브라우저에서는 현재 위치 기능을 지원하지 않습니다.');
    return;
  }
  setLocateButtonState('위치 확인 중', true);
  navigator.geolocation.getCurrentPosition(showUserLocationOnMap, handleLocationError, {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 30000
  });
}

function placeSearchText(p) {
  return `${p.name} ${getPlaceDisplayName(p)} ${p.building} ${p.address}`.toLowerCase();
}

function matchesQuery(i) {
  const p = places[i];
  const placeDong = getPlaceDong(p);
  if (selectedDong && placeDong !== selectedDong) return false;
  if (!selectedDong && selectedDistrict && !getSelectedDongs().includes(placeDong)) return false;
  return !activeQuery || placeSearchText(p).includes(activeQuery);
}

function shouldShowPlace(i, selectedOnly = printMode) {
  if (selectedOnly) return i === selectedIndex;
  return matchesQuery(i);
}

function updateResultLabels(visibleCount) {
  const text = getFilterLabel(visibleCount);
  document.getElementById('result-count').textContent = activeQuery ? `${visibleCount}곳` : `${visibleCount}곳`;
  document.getElementById('panel-summary').textContent = text;
}

function applyCurrentFilters() {
  printMode = false;
  const visibleIndices = [];
  listItems.forEach((item, idx) => {
    const visible = matchesQuery(idx);
    item.style.display = visible ? '' : 'none';
    markers[idx].setMap(visible ? map : null);
    circles[idx].setMap(visible ? map : null);
    if (visible) visibleIndices.push(idx);
  });
  updateResultLabels(visibleIndices.length);
  return visibleIndices;
}

function fitPlaces(indices) {
  if (!indices.length) return;
  if (indices.length === 1) {
    const p = places[indices[0]];
    map.setCenter(getPlacePosition(p));
    map.setZoom(16);
    return;
  }
  if (naver.maps.LatLngBounds && typeof map.fitBounds === 'function') {
    const bounds = new naver.maps.LatLngBounds(
      getPlacePosition(places[indices[0]]),
      getPlacePosition(places[indices[0]])
    );
    indices.slice(1).forEach(idx => bounds.extend(getPlacePosition(places[idx])));
    map.fitBounds(bounds, { top: 90, right: 40, bottom: 40, left: 40 });
    return;
  }
  const center = indices.reduce((acc, idx) => {
    const coordinates = getPlaceCoordinates(places[idx]);
    acc.lat += coordinates.lat;
    acc.lon += coordinates.lon;
    return acc;
  }, { lat: 0, lon: 0 });
  map.setCenter(new naver.maps.LatLng(center.lat / indices.length, center.lon / indices.length));
  map.setZoom(selectedDong ? 15 : 12);
}

function renderFilterControls() {
  const districtSelect = document.getElementById('district-select');
  const dongSelect = document.getElementById('dong-select');
  districtSelect.innerHTML = [
    '<option value="">전체 선거구</option>',
    '<optgroup label="광산구 갑/을">',
    ...districtAreas.map(area => `<option value="${area.id}">${area.label}</option>`),
    '</optgroup>',
    '<optgroup label="세부 선거구">',
    ...districts.map(district => `<option value="${district.id}">${district.label} · ${district.area}</option>`),
    '</optgroup>'
  ].join('');
  districtSelect.value = selectedDistrict;

  const dongOptions = getSelectedDongs();
  dongSelect.innerHTML = '<option value="">동 전체</option>' + dongOptions.map(dong => `<option value="${dong}">${dong}</option>`).join('');
  dongSelect.value = selectedDong;
}

function handleDistrictChange(value) {
  selectedFilterContext = null;
  selectedDistrict = value;
  selectedDong = '';
  renderFilterControls();
  updateFilteredView({ fit: true });
  expandMobileToolbar();
}

function handleDongChange(value) {
  selectedFilterContext = null;
  selectedDong = value;
  collapseMobileToolbar();
  updateFilteredView({ fit: true });
  collapseMobileToolbar();
}

function updateFilteredView(options = {}) {
  const visibleIndices = applyCurrentFilters();
  if (visibleIndices.length === 1) {
    openPlace(visibleIndices[0], { keepFilterContext: true });
  } else if (activeQuery) {
    const message = visibleIndices.length ? `${getFilterLabel(visibleIndices.length)} - 투표소를 선택하세요` : '검색 결과 없음';
    clearSelection(message);
  } else {
    const hasFilter = selectedDistrict || selectedDong;
    const message = hasFilter && visibleIndices.length ? `${getFilterLabel(visibleIndices.length)} - 투표소를 선택하세요` : '투표소를 선택하세요';
    clearSelection(message);
  }
  if (options.fit && visibleIndices.length && visibleIndices.length !== 1) fitPlaces(visibleIndices);
}

function togglePanel(forceOpen) {
  if (isMobileLayout()) {
    const shouldOpen = forceOpen ?? document.body.classList.contains('panel-collapsed');
    document.body.classList.toggle('panel-collapsed', !shouldOpen);
    setMobileToolbarCollapsed(true);
    updatePanelToggleLabel();
    setTimeout(() => {
      naver.maps.Event.trigger(map, 'resize');
      if (selectedIndex !== null) {
        const p = places[selectedIndex];
        map.setCenter(getPlacePosition(p));
      }
    }, 180);
    return;
  }
  const body = document.body;
  const shouldOpen = forceOpen ?? body.classList.contains('panel-collapsed');
  body.classList.toggle('panel-collapsed', !shouldOpen);
  updatePanelToggleLabel();
  setTimeout(() => {
    naver.maps.Event.trigger(map, 'resize');
    if (selectedIndex !== null) {
      const p = places[selectedIndex];
      map.setCenter(getPlacePosition(p));
    }
  }, 220);
}

function focusSelectedForPrint() {
  const p = places[selectedIndex];
  const pos = getPlacePosition(p);
  map.setZoom(18);
  naver.maps.Event.trigger(map, 'resize');
  map.setCenter(pos);
  [40, 120, 260, 520, 850].forEach(delay => {
    setTimeout(() => {
      naver.maps.Event.trigger(map, 'resize');
      map.setZoom(18);
      map.setCenter(pos);
    }, delay);
  });
}

function syncPrintMapSize() {
  const mapWrap = document.getElementById('map-wrap');
  const mapElement = document.getElementById('map');
  const width = Math.round(mapWrap.getBoundingClientRect().width);
  const height = Math.round(mapWrap.getBoundingClientRect().height);
  if (!width || !height) return;
  mapElement.style.width = `${width}px`;
  mapElement.style.height = `${height}px`;
  if (typeof map.setSize === 'function' && naver.maps.Size) {
    map.setSize(new naver.maps.Size(width, height));
  }
  naver.maps.Event.trigger(map, 'resize');
}

function prepareSelectedForPrint() {
  closePopup();
  setSelectedOnlyMode(true);
  document.body.classList.add('printing-map');
  collapseMobileToolbar();
  syncPrintMapSize();
  focusSelectedForPrint();
}

function cleanupPrintLayout() {
  document.body.classList.remove('printing-map');
  const mapElement = document.getElementById('map');
  mapElement.style.width = '';
  mapElement.style.height = '';
  naver.maps.Event.trigger(map, 'resize');
}

function waitForPrintCenter() {
  return new Promise(resolve => {
    requestAnimationFrame(() => {
      syncPrintMapSize();
      focusSelectedForPrint();
      requestAnimationFrame(() => {
        syncPrintMapSize();
        focusSelectedForPrint();
        setTimeout(() => {
          syncPrintMapSize();
          focusSelectedForPrint();
          setTimeout(() => {
            syncPrintMapSize();
            focusSelectedForPrint();
            resolve();
          }, 450);
        }, 850);
      });
    });
  });
}

async function printSelected() {
  if (selectedIndex === null) {
    const firstVisibleIndex = places.findIndex((_, idx) => matchesQuery(idx));
    if (firstVisibleIndex === -1) {
      window.alert('인쇄할 검색 결과가 없습니다.');
      return;
    }
    openPlace(firstVisibleIndex, { print: true });
  } else {
    openPlace(selectedIndex, { print: true });
  }
  prepareSelectedForPrint();
  await waitForPrintCenter();
  setTimeout(() => {
    focusSelectedForPrint();
    window.print();
  }, 120);
}

async function shareMap() {
  if (navigator.share) {
    try {
      await navigator.share({ title: SHARE_TITLE, text: SHARE_TEXT, url: SHARE_URL });
      return;
    } catch (error) {
      if (error && error.name === 'AbortError') return;
    }
  }
  try {
    await navigator.clipboard.writeText(SHARE_URL);
    window.alert('공유 링크를 복사했습니다. 카카오톡 대화창에 붙여넣어 주세요.');
  } catch (error) {
    window.prompt('아래 링크를 복사해 카카오톡에 붙여넣어 주세요.', SHARE_URL);
  }
}

window.addEventListener('afterprint', () => {
  cleanupPrintLayout();
  applyCurrentFilters();
  if (selectedIndex !== null) {
    const p = places[selectedIndex];
    map.setCenter(getPlacePosition(p));
  }
});

window.addEventListener('beforeprint', () => {
  if (selectedIndex === null) {
    const firstVisibleIndex = places.findIndex((_, idx) => matchesQuery(idx));
    if (firstVisibleIndex === -1) return;
    selectedIndex = firstVisibleIndex;
    setPrintTitle(places[selectedIndex]);
  }
  prepareSelectedForPrint();
  requestAnimationFrame(() => focusSelectedForPrint());
});

if (window.matchMedia) {
  const printQuery = window.matchMedia('print');
  printQuery.addEventListener('change', event => {
    if (event.matches && selectedIndex !== null) {
      closePopup();
      setSelectedOnlyMode(true);
      focusSelectedForPrint();
    }
  });
}

Object.assign(window, {
  openPlace,
  closePopup,
  setSelectedOnlyMode,
  showAllPlaces,
  clearSelectedPlace,
  focusSelectedForPrint,
  printSelected,
  showMyLocation,
  shareMap,
  handleDistrictChange,
  handleDongChange,
  setMapType,
  toggleMapTypeMenu,
  downloadReviewOverrides,
  resetReviewDraft
});

window.pollingMapState = () => ({
  selectedIndex,
  visibleMarkers: markers.filter(marker => !!marker.getMap()).length,
  visibleCircles: circles.filter(circle => !!circle.getMap()).length,
  printMode,
  selectedDistrict,
  selectedDong,
  reviewMode,
  reviewDraftCount: Object.keys(reviewCoordinateDraft).length
});

document.getElementById('print-btn').addEventListener('click', printSelected);
document.getElementById('locate-btn').addEventListener('click', showMyLocation);
document.getElementById('map-locate-btn').addEventListener('click', showMyLocation);
document.getElementById('share-btn').addEventListener('click', shareMap);
document.getElementById('clear-selection-btn').addEventListener('click', clearSelectedPlace);
document.getElementById('show-all-btn').addEventListener('click', showAllPlaces);
document.getElementById('close-popup-btn').addEventListener('click', closePopup);
document.getElementById('panel-toggle-btn').addEventListener('click', () => togglePanel());
document.getElementById('review-download-btn').addEventListener('click', downloadReviewOverrides);
document.getElementById('review-reset-btn').addEventListener('click', resetReviewDraft);
document.getElementById('district-select').addEventListener('change', event => handleDistrictChange(event.target.value));
document.getElementById('dong-select').addEventListener('change', event => handleDongChange(event.target.value));
document.getElementById('map-type-toggle').addEventListener('click', event => {
  event.stopPropagation();
  toggleMapTypeMenu();
});
document.querySelectorAll('.map-type-option').forEach(button => {
  button.addEventListener('click', event => {
    event.stopPropagation();
    setMapType(button.dataset.mapType);
  });
});
document.addEventListener('click', () => toggleMapTypeMenu(false));
document.getElementById('search-input').addEventListener('input', event => {
  activeQuery = event.target.value.trim().toLowerCase();
  updateFilteredView({ fit: true });
});
document.getElementById('search-input').addEventListener('keydown', event => {
  if (event.key === 'Enter') {
    event.currentTarget.blur();
    collapseMobileToolbar();
  }
});
document.getElementById('search-input').addEventListener('blur', () => {
  if (activeQuery) collapseMobileToolbar();
});

function getPollingPlaceStampIcon(highlight = false) {
  const size = getPollingMarkerSize();
  if (highlight) {
    const outerSize = size + 12;
    const imageSize = size + 4;
    return {
      content: `<div style="width:${outerSize}px;height:${outerSize}px;border:3px solid #facc15;border-radius:50%;background:#fff;box-shadow:0 0 0 2px rgba(17,24,39,.45),0 3px 10px rgba(0,0,0,.32);display:flex;align-items:center;justify-content:center;box-sizing:border-box"><img src="polling-stamp.svg" alt="" style="width:${imageSize}px;height:${imageSize}px;display:block"></div>`,
      size: new naver.maps.Size(outerSize, outerSize),
      anchor: new naver.maps.Point(outerSize / 2, outerSize / 2)
    };
  }
  return {
    url: 'polling-stamp.svg',
    size: new naver.maps.Size(size, size),
    scaledSize: new naver.maps.Size(size, size),
    anchor: new naver.maps.Point(size / 2, size / 2)
  };
}

places.forEach((p,i)=>{
  const pos=getPlacePosition(p);
  const marker=new naver.maps.Marker({ position: pos, map, title: getPlaceDisplayName(p), icon: getPollingPlaceStampIcon(), draggable: reviewMode });
  const circle=new naver.maps.Circle({ map, center: pos, radius: 100, ...getCircleStyle() });
  markers.push(marker); circles.push(circle);
  naver.maps.Event.addListener(marker,'click',()=>openPlace(i));
  naver.maps.Event.addListener(marker, 'mouseover', () => showHoverLabel(i));
  naver.maps.Event.addListener(marker, 'mouseout', hideHoverLabel);
  if (reviewMode) {
    naver.maps.Event.addListener(marker, 'dragend', () => {
      const position = marker.getPosition();
      circle.setCenter(position);
      updateReviewDraft(i, position);
      setPrintTitle(p);
    });
  }
  const div=document.createElement('div'); div.className='item';
  div.dataset.index = i;
  div.innerHTML=`<div><div class="name">${i+1}. ${escapeHtml(getPlaceDisplayName(p))}</div><div class="addr">${escapeHtml(p.building)}<br>${escapeHtml(p.address)}</div></div><button class="icon-btn" type="button" title="이 투표소 A4 인쇄">인쇄</button>`;
  div.onclick=(event)=>{ togglePanel(false); openPlace(i); };
  div.querySelector('button').onclick=(event)=>{ event.stopPropagation(); openPlace(i, { print: true }); printSelected(); };
  listItems.push(div);
  document.getElementById('list').appendChild(div);
});

naver.maps.Event.addListener(map, 'click', () => {
  collapseMobileToolbar();
  toggleMapTypeMenu(false);
});
naver.maps.Event.addListener(map, 'zoom_changed', refreshPollingMarkerIcons);
mobileMediaQuery.addEventListener('change', event => {
  if (event.matches) {
    setMobileToolbarCollapsed(true);
  } else {
    document.body.classList.remove('mobile-toolbar-collapsed');
    updatePanelToggleLabel();
  }
});

setActiveItem(0);
renderFilterControls();
clearSelection();
updateResultLabels(places.length);
setMobileToolbarCollapsed(isMobileLayout());
if (reviewMode) {
  document.body.classList.add('review-mode');
  updateReviewStatus();
}
</script>
</body>
